<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Orden</title>
  <link rel="manifest" href="manifest.json"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="theme-color" content="#3A7A3A"/>
  <link rel="apple-touch-icon" href="icon.jpg"/>
  <link rel="icon" href="icon.jpg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#F9F7F4; --card:#fff; --border:rgba(0,0,0,0.08);
      --text:#1A1A1A; --sec:#888780;
      --sage:#C9DFC9; --sage-mid:#9EC49E; --sage-dark:#3A7A3A;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Inter',-apple-system,sans-serif;font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}

    /* categories */
    .cat-casa   {background:#FDE8D8;color:#A05A2C}
    .cat-compras{background:#FDFAD8;color:#9A8C20}
    .cat-oficina{background:#D8FDE8;color:#2CA05A}
    .cat-estudio{background:#DCE8FC;color:#2C5AA0}
    .cat-vida   {background:#EAD8FD;color:#6A2CA0}
    /* priority dots */
    .dot-alta   {background:#E24B4A}
    .dot-normal {background:#EF9F27}
    .dot-cuando {background:#B4B2A9}

    /* layout */
    #app{display:flex;height:100vh;overflow:hidden}
    .sidebar{
      width:68px;background:#fff;border-right:.5px solid var(--border);
      display:flex;flex-direction:column;align-items:center;padding:18px 0 24px;gap:2px;flex-shrink:0
    }
    .sidebar-brand{font-size:13px;font-weight:500;color:var(--sage-dark);letter-spacing:.12em;text-transform:uppercase;margin-bottom:20px;user-select:none}
    .nav-btn{
      position:relative;width:42px;height:42px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;border:none;background:transparent;color:var(--sec);transition:background .15s,color .15s
    }
    .nav-btn:hover{background:#EEF5EE;color:var(--sage-dark)}
    .nav-btn.active{background:var(--sage);color:var(--sage-dark)}
    .tip{
      position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);
      background:#1A1A1A;color:#fff;font-size:11px;font-weight:500;padding:4px 9px;border-radius:5px;
      white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s;z-index:99
    }
    .nav-btn:hover .tip{opacity:1}

    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .topbar{
      height:52px;background:#fff;border-bottom:.5px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0
    }
    .topbar-title{font-size:16px;font-weight:500}
    .topbar-date{font-size:12px;color:var(--sec)}
    .content{flex:1;overflow-y:auto;padding:24px}

    /* bottom nav */
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:.5px solid var(--border);height:62px;z-index:50}
    .bnav-item{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:3px;cursor:pointer;color:var(--sec);font-size:10px;font-weight:500;
      border:none;background:transparent;padding-bottom:2px;transition:color .15s
    }
    .bnav-item.active{color:var(--sage-dark)}

    /* ico */
    .ico{display:inline-flex;align-items:center;flex-shrink:0}
    .ico svg{display:block;width:100%;height:100%}

    /* quick add */
    .qa-wrap{background:#fff;border:.5px solid var(--border);border-radius:8px;margin-bottom:20px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .qa-row{display:flex;align-items:center;height:48px;padding:0 14px;gap:10px}
    .qa-row .qa-input{flex:1;border:none;outline:none;font-family:inherit;font-size:14px;color:var(--text);background:transparent}
    .qa-row .qa-input::placeholder{color:var(--sec)}
    .qa-icon{color:var(--sec);display:flex;align-items:center;flex-shrink:0}
    .qa-submit{
      width:28px;height:28px;border-radius:6px;border:none;background:var(--sage);
      color:var(--sage-dark);display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;transition:background .15s
    }
    .qa-submit:hover{background:var(--sage-mid)}
    .qa-submit:disabled{opacity:.4;cursor:default}

    /* stepper */
    .stepper{border-top:.5px solid var(--border);padding:14px 16px 16px;animation:slideIn .18s ease}
    @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .step-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .step-progress{display:flex;gap:5px}
    .step-back{background:none;border:none;font-size:11px;color:var(--sec);cursor:pointer;font-family:inherit;padding:0;transition:color .12s}
    .step-back:hover{color:var(--text)}
    .step-pip{height:3px;border-radius:2px;background:#E5E3DF;transition:all .2s}
    .step-pip.done{background:var(--sage-dark);width:12px}
    .step-pip.current{background:var(--sage-dark);width:20px}
    .step-pip.todo{width:8px}
    .step-label{font-size:11px;font-weight:500;color:var(--sec);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
    .step-opts{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .step-opt{
      padding:6px 14px;border-radius:20px;border:.5px solid var(--border);
      font-size:13px;cursor:pointer;background:#fff;color:var(--text);
      transition:all .12s;font-family:inherit;line-height:1
    }
    .step-opt:hover{background:var(--sage);border-color:var(--sage);color:var(--sage-dark);font-weight:500}
    .step-opt.skip{color:var(--sec)}
    .step-input{padding:7px 11px;border:.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;color:var(--text);background:#fff;outline:none}
    .step-input:focus{border-color:var(--sage-dark)}
    .step-confirm{
      padding:7px 14px;border-radius:20px;border:.5px solid var(--sage-dark);
      font-size:13px;cursor:pointer;background:var(--sage);color:var(--sage-dark);
      font-family:inherit;font-weight:500;transition:background .12s
    }
    .step-confirm:hover{background:var(--sage-mid)}

    /* sections */
    .sec-label{font-size:11px;font-weight:500;color:var(--sec);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
    .sec-block{margin-bottom:28px}

    /* task card */
    .task-card{
      background:#fff;border:.5px solid var(--border);border-radius:8px;
      padding:11px 14px;display:flex;align-items:center;gap:10px;
      margin-bottom:6px;transition:box-shadow .15s,opacity .2s;animation:cardIn .18s ease
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    .task-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.06)}
    .task-card.done{opacity:.45}
    .tc-check{
      width:18px;height:18px;border-radius:50%;border:1.5px solid #D0CEC9;
      cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s
    }
    .tc-check:hover{border-color:var(--sage-dark)}
    .tc-check.checked{background:var(--sage-dark);border-color:var(--sage-dark)}
    .tc-body{flex:1;min-width:0}
    .tc-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tc-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
    .tc-time{font-size:11px;color:var(--sec)}
    .pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
    .cbadge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
    .tc-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
    .tc-btn{
      padding:3px 9px;border-radius:5px;border:.5px solid var(--border);
      font-size:11px;cursor:pointer;background:transparent;color:var(--sec);
      font-family:inherit;white-space:nowrap;transition:all .12s
    }
    .tc-btn:hover{background:var(--sage);color:var(--sage-dark);border-color:var(--sage)}
    .in-curso-tag{font-size:11px;color:#EF9F27;font-weight:500}
    .assign-wrap{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}

    /* empty */
    .empty{text-align:center;padding:28px 16px;color:var(--sec);font-size:13px;line-height:1.6}

    /* calendar */
    .cal-card{background:#fff;border:.5px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .cal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:.5px solid var(--border)}
    .cal-nav{
      width:30px;height:30px;border-radius:6px;border:.5px solid var(--border);
      background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
      color:var(--sec);transition:background .12s
    }
    .cal-nav:hover{background:var(--sage);color:var(--sage-dark);border-color:var(--sage)}
    .cal-month{font-size:15px;font-weight:500}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
    .cal-dow{text-align:center;padding:7px 4px;font-size:11px;font-weight:500;color:var(--sec);border-bottom:.5px solid var(--border)}
    .cal-day{
      min-height:78px;padding:5px;border-right:.5px solid var(--border);border-bottom:.5px solid var(--border);
      cursor:pointer;transition:background .1s;overflow:hidden
    }
    .cal-day:nth-child(7n){border-right:none}
    .cal-day:hover{background:#F4F2EF}
    .cal-day.other{opacity:.3;pointer-events:none}
    .cal-day.selected{background:#F0F7F0}
    .cal-day-num{font-size:12px;font-weight:500;margin-bottom:3px;display:inline-flex}
    .cal-day.today .cal-day-num{background:var(--sage-dark);color:#fff;border-radius:50%;width:20px;height:20px;align-items:center;justify-content:center}
    .cal-chip{display:block;padding:1px 5px;border-radius:3px;font-size:10px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cal-more{font-size:10px;color:var(--sec)}
    .day-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .day-head-title{font-size:15px;font-weight:500}
    .day-close{width:28px;height:28px;border-radius:6px;border:.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sec)}

    /* bandeja */
    .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .fchip{padding:4px 12px;border-radius:20px;border:.5px solid var(--border);font-size:12px;cursor:pointer;background:#fff;color:var(--text);font-family:inherit;transition:all .12s}
    .fchip.on{background:var(--sage);border-color:var(--sage);color:var(--sage-dark);font-weight:500}

    /* tiempo libre */
    .tiempo-btns{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
    .tbtn{padding:10px 22px;border-radius:10px;border:.5px solid var(--border);font-size:14px;cursor:pointer;background:#fff;font-family:inherit;transition:all .15s}
    .tbtn:hover{background:#EEF5EE;border-color:var(--sage-mid)}
    .tbtn.on{background:var(--sage);border-color:var(--sage);color:var(--sage-dark);font-weight:500}
    .warn-tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;background:#FFF3CD;color:#856404}

    /* responsive */
    @media(max-width:768px){
      .sidebar{display:none}
      .bottom-nav{display:flex}
      .topbar{padding:0 16px}
      .topbar-date{display:none}
      .content{padding:16px;padding-bottom:80px}
      .cal-day{min-height:56px}
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

// ── Constants ─────────────────────────────────────────────────────────────────
const CATS     = ['Casa','Compras','Oficina','Estudio','Vida personal'];
const CAT_CLS  = {'Casa':'casa','Compras':'compras','Oficina':'oficina','Estudio':'estudio','Vida personal':'vida'};
const PRIOS    = ['Alta','Normal','Cuando pueda'];
const PRIO_KEY = {'Alta':'alta','Normal':'normal','Cuando pueda':'cuando'};
const MESES    = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DOWS     = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DUR_OPTS = [{l:'15 min',v:15},{l:'30 min',v:30},{l:'1 h',v:60},{l:'2 h',v:120},{l:'3 h',v:180},{l:'4 h',v:240},{l:'+ de 4 h',v:300}];
const NAV      = [{id:'hoy',icon:'sun',label:'Hoy'},{id:'cal',icon:'cal',label:'Calendario'},{id:'libre',icon:'clock',label:'Tiempo libre'}];
const TITLES   = {hoy:'Hoy',cal:'Calendario',libre:'Tengo tiempo libre'};
const BNAV_LBL = {hoy:'Hoy',cal:'Agenda',libre:'Tiempo'};

// ── SVG Icons ─────────────────────────────────────────────────────────────────
const ICONS = {
  sun:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>`,
  cal:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  inbox: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>`,
  clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  plus:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  up:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  left:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  right: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  x:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
};
function ico(name, size) { size = size || 20; var svg = ICONS[name].replace('<svg', '<svg width="'+size+'" height="'+size+'"'); return `<span class="ico" style="width:${size}px;height:${size}px">${svg}</span>`; }

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function ds(y,m,d){ return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
function fmtDur(m){ if(!m)return''; if(m<60)return m+' min'; if(m===60)return'1 h'; if(m===90)return'1:30 h'; if(m===120)return'2 h'; return (m/60).toFixed(1).replace('.0','')+' h'; }
function fmtDate(d){ if(!d)return''; var p=d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function catBadge(cat){ return cat?`<span class="cbadge cat-${CAT_CLS[cat]||'vida'}">${esc(cat)}</span>`:''; }
function prioDot(p){ return `<span class="pdot dot-${PRIO_KEY[p]||'cuando'}"></span>`; }

// ── State ─────────────────────────────────────────────────────────────────────
var S = {
  section: 'hoy',
  tasks: (function(){ try{ return JSON.parse(localStorage.getItem('orden_v1')||'[]'); }catch(e){ return []; } })(),
  qaText: '', qaStep: null, qaForm: {}, qaFecha: '', qaHorario: '',
  calYear: new Date().getFullYear(), calMonth: new Date().getMonth(), calSelDay: null,
  banFilter: null,
  tiempoMin: null,
  assignId: null, assignDate: ''
};

// ── Firebase ──────────────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyB0ZCH1UirnjjPtvG39D-e6lDPTkTRJhBU",
  authDomain: "ordenpersonal-4d6b9.firebaseapp.com",
  projectId: "ordenpersonal-4d6b9",
  storageBucket: "ordenpersonal-4d6b9.firebasestorage.app",
  messagingSenderId: "1092278958077",
  appId: "1:1092278958077:web:0b343c7b51f8db69dd4b94"
});
var db = firebase.firestore();
var COL = 'ordenTasks';

function initFirestore() {
  db.collection(COL).orderBy('fechaCreacion', 'desc')
    .onSnapshot(function(snap) {
      S.tasks = snap.docs.map(function(d){ return d.data(); });
      try { localStorage.setItem('orden_v1', JSON.stringify(S.tasks)); } catch(e){}
      render();
    }, function(err) {
      console.warn('Firestore:', err);
    });
}

function save() {
  try { localStorage.setItem('orden_v1', JSON.stringify(S.tasks)); } catch(e) {}
}

function addTask(t){
  var task = Object.assign({}, t, {id:uid(), fechaCreacion:new Date().toISOString()});
  S.tasks.unshift(task);
  save();
  db.collection(COL).doc(task.id).set(task);
}
function updTask(id,u){
  S.tasks = S.tasks.map(function(t){ return t.id===id ? Object.assign({},t,u) : t; });
  save();
  db.collection(COL).doc(id).update(u);
}

function resetQA(){
  S.qaText=''; S.qaStep=null; S.qaForm={}; S.qaFecha=''; S.qaHorario='';
}

function commitQA(){
  if(!S.qaText.trim()) return;
  addTask({
    texto: S.qaText.trim(),
    tipo: S.qaForm.tipo||'libre',
    fecha: S.qaFecha||null,
    horario: S.qaHorario||null,
    duracion: S.qaForm.duracion||null,
    categoria: S.qaForm.categoria||null,
    prioridad: S.qaForm.prioridad||'Normal',
    estado: 'pendiente',
    recurrencia: null, recordatorio: null
  });
  resetQA();
}

// ── Render helpers ────────────────────────────────────────────────────────────
function renderTask(t){
  var done  = t.estado==='hecha';
  var curso = t.estado==='en-curso';
  var meta  = prioDot(t.prioridad)
    + catBadge(t.categoria)
    + (t.duracion ? `<span class="tc-time">${fmtDur(t.duracion)}</span>` : '')
    + (t.horario  ? `<span class="tc-time">${esc(t.horario)}</span>` : '')
    + (t.fecha && t.tipo==='deadline'   ? `<span class="tc-time">⚑ ${fmtDate(t.fecha)}</span>` : '')
    + (t.fecha && t.tipo==='presencial' ? `<span class="tc-time">📍 ${fmtDate(t.fecha)}</span>` : '');

  var assignHtml = S.assignId===t.id ? `
    <div class="assign-wrap">
      <input type="date" class="step-input" id="assign-date-input" value="${esc(S.assignDate)}" min="${todayStr()}" style="font-size:12px;padding:5px 8px"/>
      <button class="step-confirm" data-action="assign-confirm" style="font-size:12px;padding:5px 12px">Confirmar</button>
      <button class="tc-btn" data-action="assign-cancel">Cancelar</button>
    </div>` : '';

  var actions = done ? '' : `<div class="tc-actions">
    ${curso
      ? `<span class="in-curso-tag">● En curso</span>`
      : `<button class="tc-btn" data-action="task-start" data-id="${t.id}">Iniciar</button>`}
    ${(!t.fecha && S.assignId!==t.id)
      ? `<button class="tc-btn" data-action="assign-open" data-id="${t.id}">Agendar</button>` : ''}
  </div>`;

  return `<div class="task-card${done?' done':''}" data-id="${t.id}">
    <div class="tc-check${done?' checked':''}" data-action="task-check" data-id="${t.id}">${done?ico('check',10):''}</div>
    <div class="tc-body">
      <div class="tc-name"${done?' style="text-decoration:line-through"':''}>${esc(t.texto)}</div>
      <div class="tc-meta">${meta}</div>
      ${assignHtml}
    </div>
    ${actions}
  </div>`;
}

function renderStepper(){
  if(S.qaStep===null) return '';
  var idx = S.qaStep===0||S.qaStep===0.5 ? 0 : S.qaStep;
  var pips = [0,1,2,3].map(function(i){ return `<div class="step-pip ${i<idx?'done':i===idx?'current':'todo'}"></div>`; }).join('');
  var body = '';

  if(S.qaStep===0){
    body = `<div class="step-label">¿Tiene fecha o es presencial?</div>
      <div class="step-opts">
        <button class="step-opt" data-action="qa-tipo" data-val="presencial">Presencial</button>
        <button class="step-opt" data-action="qa-tipo" data-val="deadline">Deadline</button>
        <button class="step-opt" data-action="qa-tipo" data-val="libre">Sin fecha</button>
      </div>`;
  } else if(S.qaStep===0.5){
    body = `<div class="step-label">${S.qaForm.tipo==='presencial'?'Día y horario':'Fecha límite'}</div>
      <div class="step-opts">
        <input type="date" class="step-input" id="qa-fecha" value="${esc(S.qaFecha)}" min="${todayStr()}"/>
        ${S.qaForm.tipo==='presencial'?`<input type="time" class="step-input" id="qa-horario" value="${esc(S.qaHorario)}"/>`:''}
        <button class="step-confirm" data-action="qa-fecha-ok">Confirmar →</button>
      </div>`;
  } else if(S.qaStep===1){
    body = `<div class="step-label">¿Cuánto tiempo lleva?</div>
      <div class="step-opts">
        ${DUR_OPTS.map(function(o){ return `<button class="step-opt" data-action="qa-dur" data-val="${o.v}">${o.l}</button>`; }).join('')}
        <button class="step-opt skip" data-action="qa-skip">Saltar</button>
      </div>`;
  } else if(S.qaStep===2){
    body = `<div class="step-label">Categoría</div>
      <div class="step-opts">
        ${CATS.map(function(c){ return `<button class="step-opt cbadge cat-${CAT_CLS[c]}" style="border-color:transparent" data-action="qa-cat" data-val="${esc(c)}">${esc(c)}</button>`; }).join('')}
        <button class="step-opt skip" data-action="qa-skip">Saltar</button>
      </div>`;
  } else if(S.qaStep===3){
    body = `<div class="step-label">Prioridad</div>
      <div class="step-opts">
        ${PRIOS.map(function(p){ return `<button class="step-opt" data-action="qa-prio" data-val="${esc(p)}">${prioDot(p)} ${esc(p)}</button>`; }).join('')}
      </div>`;
  }

  var backBtn = S.qaStep !== 0
    ? `<button class="step-back" data-action="qa-back">← Atrás</button>`
    : `<button class="step-back" data-action="qa-cancel">✕ Cancelar</button>`;

  return `<div class="stepper"><div class="step-header"><div class="step-progress">${pips}</div>${backBtn}</div>${body}</div>`;
}

function renderQA(){
  return `<div class="qa-wrap">
    <form class="qa-row" data-action="qa-form">
      <span class="qa-icon">${ico('plus',14)}</span>
      <input type="text" class="qa-input" id="qa-input" placeholder="Agregar una tarea..."
        value="${esc(S.qaText)}" ${S.qaStep!==null?'disabled':''} autocomplete="off"/>
      <button type="submit" class="qa-submit" ${(!S.qaText.trim()||S.qaStep!==null)?'disabled':''}>
        ${ico('up',14)}
      </button>
    </form>
    ${renderStepper()}
  </div>`;
}

// ── Section renderers ─────────────────────────────────────────────────────────
function renderHoy(){
  var today = todayStr();
  var agendadas = S.tasks
    .filter(function(t){
      if(t.estado==='hecha') return false;
      if(t.tipo==='presencial') return t.fecha===today;
      if(t.tipo==='deadline') return t.fecha && t.fecha>=today;
      return false;
    })
    .sort(function(a,b){
      // presenciales primero (por horario), deadlines después (por fecha límite)
      if(a.tipo==='presencial' && b.tipo!=='presencial') return -1;
      if(a.tipo!=='presencial' && b.tipo==='presencial') return 1;
      if(a.tipo==='deadline' && b.tipo==='deadline') return (a.fecha||'').localeCompare(b.fecha||'');
      return (a.horario||'99:99').localeCompare(b.horario||'99:99');
    });
  var libres = S.tasks.filter(function(t){ return t.estado!=='hecha' && t.tipo==='libre' && !t.fecha; });

  return renderQA()
    + `<div class="sec-block"><div class="sec-label">Agendadas hoy</div>`
    + (agendadas.length ? agendadas.map(renderTask).join('') : '<div class="empty">Sin tareas agendadas para hoy</div>')
    + `</div><div class="sec-block"><div class="sec-label">Pendientes libres</div>`
    + (libres.length ? libres.map(renderTask).join('') : '<div class="empty">Sin pendientes libres</div>')
    + `</div>`;
}

function renderCal(){
  var y=S.calYear, m=S.calMonth;
  var today=todayStr();
  var firstDow=new Date(y,m,1).getDay();
  var daysInMo=new Date(y,m+1,0).getDate();
  var prevLast=new Date(y,m,0).getDate();

  var cells=[];
  for(var i=firstDow-1;i>=0;i--) cells.push({d:prevLast-i,cur:false});
  for(var d=1;d<=daysInMo;d++) cells.push({d:d,cur:true});
  while(cells.length%7!==0) cells.push({d:cells.length-daysInMo-firstDow+1,cur:false});

  var cellsHtml = cells.map(function(c){
    if(!c.cur) return `<div class="cal-day other"><div class="cal-day-num">${c.d}</div></div>`;
    var dstr = ds(y,m,c.d);
    var isToday = dstr===today;
    var isSel = S.calSelDay===c.d;
    var dt = S.tasks.filter(function(t){ return t.fecha===dstr && t.estado!=='hecha'; });
    var chips = dt.slice(0,2).map(function(t){ return `<span class="cal-chip cat-${CAT_CLS[t.categoria]||'vida'}">${esc(t.texto)}</span>`; }).join('');
    var more = dt.length>2 ? `<span class="cal-more">+${dt.length-2}</span>` : '';
    return `<div class="cal-day${isToday?' today':''}${isSel?' selected':''}" data-action="cal-day" data-d="${c.d}">
      <div class="cal-day-num">${c.d}</div>${chips}${more}</div>`;
  }).join('');

  var selDs = S.calSelDay ? ds(y,m,S.calSelDay) : null;
  var selTasks = selDs ? S.tasks.filter(function(t){ return t.fecha===selDs && t.estado!=='hecha'; }) : [];

  var detail = S.calSelDay ? `<div style="margin-top:20px">
    <div class="day-head">
      <span class="day-head-title">${S.calSelDay} de ${MESES[m]}</span>
      <button class="day-close" data-action="cal-close">${ico('x',12)}</button>
    </div>
    ${renderQA()}
    ${selTasks.length ? selTasks.map(renderTask).join('') : '<div class="empty">Sin tareas para este día</div>'}
  </div>` : '';

  return `<div class="cal-card">
    <div class="cal-head">
      <button class="cal-nav" data-action="cal-prev">${ico('left',14)}</button>
      <span class="cal-month">${MESES[m]} ${y}</span>
      <button class="cal-nav" data-action="cal-next">${ico('right',14)}</button>
    </div>
    <div class="cal-grid">
      ${DOWS.map(function(d){ return `<div class="cal-dow">${d}</div>`; }).join('')}
      ${cellsHtml}
    </div>
  </div>${detail}`;
}

function renderBandeja(){
  var undated = S.tasks.filter(function(t){ return !t.fecha && t.estado!=='hecha'; });
  var shown = S.banFilter ? undated.filter(function(t){ return t.categoria===S.banFilter; }) : undated;
  var chips = ['Todas'].concat(CATS).map(function(c){
    var isAll=c==='Todas', active=isAll?!S.banFilter:S.banFilter===c;
    return `<button class="fchip${active?' on':''}" data-action="ban-filter" data-val="${isAll?'':esc(c)}">${esc(c)}</button>`;
  }).join('');
  return `<div class="filters">${chips}</div>`
    + (shown.length ? shown.map(renderTask).join('') : '<div class="empty"><div style="margin-bottom:6px">La bandeja está vacía</div><div style="font-size:12px">Las tareas sin fecha aparecen aquí</div></div>');
}

function renderLibre(){
  var OPTS=[{l:'30 min',v:30},{l:'1 hora',v:60},{l:'1:30 h',v:90},{l:'2 horas',v:120}];
  var pool=S.tasks.filter(function(t){ return t.estado==='pendiente'||t.estado==='en-curso'; });
  var prioOrder={'Alta':0,'Normal':1,'Cuando pueda':2};
  function sortP(arr){ return arr.slice().sort(function(a,b){ return (prioOrder[a.prioridad]||1)-(prioOrder[b.prioridad]||1); }); }
  var fits  = S.tiempoMin ? sortP(pool.filter(function(t){ return t.duracion&&t.duracion<=S.tiempoMin; })).slice(0,4) : [];
  var noFit = S.tiempoMin ? sortP(pool.filter(function(t){ return t.duracion&&t.duracion>S.tiempoMin&&t.prioridad==='Alta'; })).slice(0,2) : [];
  var btns  = OPTS.map(function(o){ return `<button class="tbtn${S.tiempoMin===o.v?' on':''}" data-action="tiempo-sel" data-val="${o.v}">${o.l}</button>`; }).join('');

  var results='';
  if(S.tiempoMin){
    if(!fits.length&&!noFit.length){
      results='<div class="empty">No hay tareas pendientes que encajen en ese tiempo</div>';
    } else {
      results = `<div class="sec-label">Tareas que entran en ${fmtDur(S.tiempoMin)}</div>`
        + fits.map(renderTask).join('')
        + (noFit.length ? `<div class="sec-label" style="margin-top:20px">Alta prioridad — no entra en el tiempo</div>`
          + noFit.map(function(t){ return `<div style="position:relative">${renderTask(t)}<span class="warn-tag" style="position:absolute;top:11px;right:14px">⚠ Excede</span></div>`; }).join('')
          : '');
    }
  } else {
    results=`<div class="empty">${pool.length?'Seleccioná cuánto tiempo tenés disponible':'No hay tareas pendientes'}</div>`;
  }

  return `<div class="sec-block"><div class="sec-label" style="margin-bottom:12px">¿Cuánto tiempo tenés disponible?</div><div class="tiempo-btns">${btns}</div></div>${results}`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  var now=new Date();
  var dl=now.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  var dateCap=dl.charAt(0).toUpperCase()+dl.slice(1);

  var sideNav=NAV.map(function(n){ return `<button class="nav-btn${S.section===n.id?' active':''}" data-action="nav" data-sec="${n.id}">${ico(n.icon,20)}<span class="tip">${n.label}</span></button>`; }).join('');
  var botNav=NAV.map(function(n){ return `<button class="bnav-item${S.section===n.id?' active':''}" data-action="nav" data-sec="${n.id}">${ico(n.icon,20)}<span>${BNAV_LBL[n.id]}</span></button>`; }).join('');

  var content='';
  if(S.section==='hoy')        content=renderHoy();
  else if(S.section==='cal')   content=renderCal();
  else if(S.section==='libre') content=renderLibre();

  document.getElementById('app').innerHTML=`
    <div class="sidebar"><div class="sidebar-brand">O</div>${sideNav}</div>
    <div class="main">
      <div class="topbar"><span class="topbar-title">${TITLES[S.section]}</span><span class="topbar-date">${dateCap}</span></div>
      <div class="content" id="content">${content}</div>
    </div>
    <div class="bottom-nav">${botNav}</div>`;
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('app').addEventListener('click', function(e){
  var el=e.target.closest('[data-action]');
  if(!el) return;
  var a=el.dataset.action;

  if(a==='nav'){
    S.section=el.dataset.sec;
    resetQA(); S.assignId=null;
    render();

  } else if(a==='task-check'){
    var t=S.tasks.find(function(t){ return t.id===el.dataset.id; });
    if(t) updTask(t.id,{estado:t.estado==='hecha'?'pendiente':'hecha'});
    render();

  } else if(a==='task-start'){
    updTask(el.dataset.id,{estado:'en-curso'});
    render();

  } else if(a==='assign-open'){
    S.assignId=el.dataset.id; S.assignDate='';
    render();

  } else if(a==='assign-confirm'){
    var inp=document.getElementById('assign-date-input');
    if(inp&&inp.value){ updTask(S.assignId,{fecha:inp.value,tipo:'deadline'}); S.assignId=null; }
    render();

  } else if(a==='assign-cancel'){
    S.assignId=null; render();

  } else if(a==='qa-cancel'){
    resetQA(); render();

  } else if(a==='qa-back'){
    if(S.qaStep===0.5){ S.qaStep=0; S.qaForm.tipo=null; }
    else if(S.qaStep===1){ S.qaStep = S.qaForm.tipo && S.qaForm.tipo!=='libre' ? 0.5 : 0; S.qaForm.duracion=null; }
    else if(S.qaStep===2){ S.qaStep=1; S.qaForm.categoria=null; }
    else if(S.qaStep===3){ S.qaStep=2; S.qaForm.prioridad=null; }
    render();

  } else if(a==='qa-tipo'){
    S.qaForm.tipo=el.dataset.val;
    S.qaStep = el.dataset.val==='libre' ? 1 : (S.qaFecha ? 1 : 0.5);
    render();

  } else if(a==='qa-fecha-ok'){
    var fi=document.getElementById('qa-fecha'), hi=document.getElementById('qa-horario');
    if(fi) S.qaFecha=fi.value;
    if(hi) S.qaHorario=hi.value;
    S.qaStep=1; render();

  } else if(a==='qa-dur'){
    S.qaForm.duracion=parseInt(el.dataset.val); S.qaStep=2; render();

  } else if(a==='qa-cat'){
    S.qaForm.categoria=el.dataset.val; S.qaStep=3; render();

  } else if(a==='qa-prio'){
    S.qaForm.prioridad=el.dataset.val;
    commitQA(); render();
    setTimeout(function(){ var i=document.getElementById('qa-input'); if(i) i.focus(); },50);

  } else if(a==='qa-skip'){
    if(S.qaStep===1) S.qaStep=2;
    else if(S.qaStep===2) S.qaStep=3;
    render();

  } else if(a==='cal-day'){
    var d=parseInt(el.dataset.d);
    if(S.calSelDay===d){ S.calSelDay=null; } else {
      S.calSelDay=d;
      S.qaFecha=ds(S.calYear,S.calMonth,d);
    }
    resetQA();
    render();

  } else if(a==='cal-prev'){
    if(S.calMonth===0){ S.calYear--; S.calMonth=11; } else S.calMonth--;
    render();

  } else if(a==='cal-next'){
    if(S.calMonth===11){ S.calYear++; S.calMonth=0; } else S.calMonth++;
    render();

  } else if(a==='cal-close'){
    S.calSelDay=null; resetQA(); render();

  } else if(a==='ban-filter'){
    S.banFilter=el.dataset.val||null; render();

  } else if(a==='tiempo-sel'){
    S.tiempoMin=parseInt(el.dataset.val); render();
  }
});

document.getElementById('app').addEventListener('submit', function(e){
  e.preventDefault();
  if(!e.target.closest('[data-action="qa-form"]')) return;
  var inp=document.getElementById('qa-input');
  if(inp) S.qaText=inp.value;
  if(!S.qaText.trim()) return;
  S.qaStep=0;
  render();
});

document.getElementById('app').addEventListener('input', function(e){
  if(e.target.id==='qa-input'){
    S.qaText=e.target.value;
    var btn=document.querySelector('.qa-submit');
    if(btn) btn.disabled=!S.qaText.trim();
  }
  if(e.target.id==='qa-fecha') S.qaFecha=e.target.value;
  if(e.target.id==='qa-horario') S.qaHorario=e.target.value;
  if(e.target.id==='assign-date-input') S.assignDate=e.target.value;
});

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
initFirestore();
setTimeout(function(){ var i=document.getElementById('qa-input'); if(i) i.focus(); },100);
</script>
